<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Café Fantini Canada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/not-found.css" />
</head>
<body>

  <div class="nf-bg">

    <!-- Organic red blob shapes -->
    <div class="blob blob-tl"></div>
    <div class="blob blob-lm"></div>
    <div class="blob blob-br"></div>
    <div class="blob blob-bl"></div>

    <!-- Musetti logo — top-right of page -->
    <div class="nf-page-logo">
      <img src="public/images/musetti-logo.png" alt="Musetti" class="page-logo-img" />
    </div>

    <!-- 404 card -->
    <div class="nf-card">

      <!-- Browser-window illustration -->
      <div class="nf-browser">
        <div class="nf-browser-bar">
          <div class="nf-traffic-dot"></div>
          <div class="nf-traffic-dot"></div>
          <div class="nf-traffic-dot"></div>
          <div class="nf-browser-url"></div>
        </div>
        <div class="nf-browser-body">
          <div class="nf-browser-404">404</div>
          <div class="nf-browser-lines">
            <div class="nf-browser-line"></div>
            <div class="nf-browser-line"></div>
          </div>
          <div class="nf-browser-dots">
            <div class="nf-browser-dot"></div>
            <div class="nf-browser-dot"></div>
            <div class="nf-browser-dot"></div>
          </div>
        </div>
      </div>

      <p class="nf-message">Looks like you've got lost...</p>

      <a href="dashboard.html" class="nf-back-btn">Back to Dashboard</a>

    </div>

  </div>

</body>
</html>
