<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Café Fantini Canada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="login-bg">

    <!-- Organic red blob shapes -->
    <div class="blob blob-tl"></div>
    <div class="blob blob-lm"></div>
    <div class="blob blob-br"></div>
    <div class="blob blob-bl"></div>

    <!-- Musetti logo — top-right of page -->
    <div class="page-logo">
      <img src="public/images/musetti-logo.png" alt="Musetti" class="page-logo-img" />
    </div>

    <!-- Login card -->
    <div class="login-card">

      <h1>Login to Account</h1>
      <p class="login-subtitle">Please enter your email and password to continue</p>

      <form id="login-form" novalidate>

        <div class="form-group">
          <label for="login-email">Email address:</label>
          <input
            id="login-email"
            type="email"
            placeholder="Email address"
            autocomplete="off"
          />
        </div>

        <div class="form-group password-group">
          <div class="password-header">
            <label for="login-password">Password</label>
            <a href="#" class="forget-link">Forget Password?</a>
          </div>
          <input
            id="login-password"
            type="password"
            autocomplete="off"
          />
          <p class="credentials-hint">
            <strong>Admin:</strong> admin@cafefantini.com / Admin1234! &nbsp;|&nbsp;
            <strong>Secretary:</strong> secretary@cafefantini.com / Secretary1!
          </p>
        </div>

        <div class="remember-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-check" />
            Remember Password
          </label>
        </div>

        <p class="form-error hidden" id="login-error"></p>

        <button type="submit" class="btn btn-primary login-submit" id="login-submit">
          Sign In
        </button>

      </form>
    </div>

  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
