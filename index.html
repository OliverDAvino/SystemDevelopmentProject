<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — StoreManager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <div class="login-bg">
    <div class="circle circle-tl"></div>
    <div class="circle circle-tr"></div>
    <div class="circle circle-bl"></div>
    <div class="circle circle-br"></div>

    <div class="login-card">
      <div class="login-logo">
        <div class="logo-mark"></div>
      </div>

      <h1>Login to Account</h1>
      <p class="login-subtitle">Please enter your email and password to continue</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input
            id="login-email"
            type="email"
            placeholder="admin@store.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input
            id="login-password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>

        <p class="form-error hidden" id="login-error"></p>

        <button type="submit" class="btn btn-primary login-submit" id="login-submit">
          Log In
        </button>
      </form>

      <p class="login-hint">Demo: admin@store.com / admin123</p>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
