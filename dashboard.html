<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — StoreManager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

  <div class="dash-layout">

    <!-- Header -->
    <header class="dash-header">
      <div class="dash-logo">
        <div class="dash-logo-mark"></div>
        <span>StoreManager</span>
      </div>
      <button class="btn btn-ghost" id="logout-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </header>

    <!-- Main -->
    <main class="dash-main">

      <!-- Toolbar -->
      <div class="dash-toolbar">
        <div class="search-wrap">
          <span class="search-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input
            class="search-input"
            id="search-input"
            type="search"
            placeholder="Search products..."
            autocomplete="off"
          />
        </div>

        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="in-stock">In Stock</button>
          <button class="filter-btn" data-filter="low-stock">Low Stock</button>
          <button class="filter-btn" data-filter="out-stock">Out of Stock</button>
        </div>

        <button class="btn btn-primary add-btn" id="add-btn">
          + Add product
        </button>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table class="product-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Product Name</th>
              <th>Item Link</th>
              <th>Quantity</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Rows injected by dashboard.js -->
          </tbody>
        </table>
      </div>

      <div class="dash-footer">
        <span id="footer-count"></span>
      </div>

    </main>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
